<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Seychelles Shop | Luxury Essentials</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --seychelles-pink: #FFB7C5; /* EL ROSA ORIGINAL */
            --soft-cream: #FCF9F9;
            --deep-gray: #1A1A1A;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--deep-gray);
            background-color: var(--soft-cream);
            letter-spacing: 0.05rem;
        }

        /* --- NAVEGACIÓN --- */
        #mainNav {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 1.2rem 0;
        }

        #mainNav .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.4rem;
            color: var(--deep-gray);
            text-transform: uppercase;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            background: var(--seychelles-pink);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Elemento decorativo Premium */
        .hero::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 9vw, 6.5rem);
            color: #fff;
            font-weight: 400;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .hero p {
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            margin-bottom: 3.5rem;
            font-weight: 300;
        }

        /* --- BOTÓN DE LUJO --- */
        .btn-luxury {
            padding: 1.2rem 3.5rem;
            border: 1.5px solid #fff;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.4rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            display: inline-block;
        }

        .btn-luxury:hover {
            background: #fff;
            color: var(--seychelles-pink);
            transform: translateY(-3px);
        }

        /* --- SECCIÓN COLECCIÓN --- */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 5rem;
            font-style: italic;
        }

        .product-item {
            margin-bottom: 5rem;
        }

        .product-image-wrapper {
            background-color: #fff;
            aspect-ratio: 4/5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            overflow: hidden;
            border: 20px solid #fff; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.04);
            transition: transform 0.6s ease;
        }

        .product-item:hover .product-image-wrapper {
            transform: scale(1.02);
        }

        .product-placeholder {
            width: 100%;
            height: 100%;
            background: #FDF2F4; /* Un rosa casi blanco para los huecos de foto */
        }

        .product-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 0.4rem;
            font-weight: 400;
        }

        .product-info span {
            color: var(--seychelles-pink);
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.1rem;
        }

        /* --- FOOTER --- */
        footer {
            padding: 6rem 0;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }

        .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            letter-spacing: 0.5rem;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            margin: 0 1.5rem;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--seychelles-pink);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#">Seychelles</a>
            <div class="ms-auto d-none d-md-block">
                <a href="#" class="text-dark text-decoration-none small" style="letter-spacing: 0.2rem;">COLECCIÓN</a>
                <a href="#" class="text-dark text-decoration-none small ms-5" style="letter-spacing: 0.2rem;">CARRITO (0)</a>
            </div>
        </div>
    </nav>

    <section class="hero text-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <p>New Arrivals • 2026</p>
                    <h1>Seychelles <br><i>Signature</i></h1>
                    <a href="#collection" class="btn-luxury">Ver Colección</a>
                </div>
            </div>
        </div>
    </section>

    <section id="collection" class="py-5" style="margin-top: 80px;">
        <div class="container">
            <h2 class="section-title">Nuestros Objetos de Deseo</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="product-item">
                        <div class="product-image-wrapper">
                            <div class="product-placeholder"></div>
                        </div>
                        <div class="product-info text-center">
                            <h3>Bolsos Premium</h3>
                            <span>$290.00</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="product-item">
                        <div class="product-image-wrapper">
                            <div class="product-placeholder"></div>
                        </div>
                        <div class="product-info text-center">
                            <h3>Esencia de Rosas</h3>
                            <span>$145.00</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="product-item">
                        <div class="product-image-wrapper">
                            <div class="product-placeholder"></div>
                        </div>
                        <div class="product-info text-center">
                            <h3>Accesorios Seda</h3>
                            <span>$85.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="text-center">
        <div class="container">
            <div class="footer-logo">Seychelles</div>
            <div class="footer-links mb-5">
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Instagram</a>
            </div>
            <p class="small text-muted" style="letter-spacing: 0.1rem;">EST. 2026 • SEYCHELLESSHOP.COM</p>
        </div>
    </footer>

</body>
</html>
