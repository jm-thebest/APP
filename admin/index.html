<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Gestión - Seychelles Shop</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #FCF9F9; padding-top: 30px; font-family: 'Montserrat', sans-serif; }
        .hidden { display: none !important; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); max-width: 440px; margin: 80px auto; text-align: center; border: 1px solid #FFB7C5; }
        .kpi-card { border: none; border-radius: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.01); transition: transform 0.2s; background: white; border-left: 4px solid #1A1A1A; }
        .kpi-card.bg-success-custom { border-left-color: #FFB7C5; }
        .font-monospace-custom { font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .table-card { background: white; border-radius: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.01); border: none; }
        .badge-category { font-size: 0.75rem; padding: 6px 10px; border-radius: 30px; }
    </style>
</head>
<body>

<div class="container-fluid px-4" style="max-width: 1600px;">
    <div id="login-screen" class="login-card">
        <div class="display-5 mb-3">👑</div>
        <h2 class="fw-bold mb-2">Seychelles Admin</h2>
        <p class="text-muted mb-4">Acceso exclusivo para administradores autorizados de la firma.</p>
        <div id="g_id_onload"
             data-client_id="463908353578-o70ia5lgf0c7fcce0utp8qqlqnc41iuo.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-size="large" data-theme="outline"></div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 pb-3 border-bottom">
            <div>
                <h1 class="h2 fw-bold text-dark m-0">Consola de Control Financiero</h1>
                <span class="badge bg-light text-dark mt-1 border font-monospace-custom" id="user-email"></span>
            </div>
            <button class="btn btn-outline-dark btn-sm mt-2 mt-sm-0 px-3 rounded-0" onclick="cerrarSesionLocal()">
                <i class="bi bi-box-arrow-right me-1"></i> Salir del Panel
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-md-4">
                <div class="card kpi-card p-2">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase small fw-bold">Facturación Bruta</h6>
                            <h2 class="card-text fw-bold font-monospace-custom m-0 text-dark" id="kpi-ingresos">0.00 €</h2>
                        </div>
                        <div class="fs-1 text-muted"><i class="bi bi-currency-euro"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card kpi-card bg-success-custom p-2">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase small fw-bold">Margen de Ganancia Neto</h6>
                            <h2 class="card-text fw-bold font-monospace-custom m-0 text-dark" id="kpi-beneficio">0.00 €</h2>
                        </div>
                        <div class="fs-1 text-muted"><i class="bi bi-graph-up-arrow"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card kpi-card p-2">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase small fw-bold">Volumen de Artículos</h6>
                            <h2 class="card-text fw-bold font-monospace-custom m-0 text-dark" id="kpi-prendas">0</h2>
                        </div>
                        <div class="fs-1 text-muted"><i class="bi bi-box-seam"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-xl-4">
                <div class="card p-4 shadow-sm border-0 table-card">
                    <h5 class="fw-bold mb-3" id="form-title">Registrar Nueva Operación</h5>
                    <form id="form-ropa">
                        <input type="hidden" id="edit-id" value=""> 
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Modelo / Descripción del Artículo</label>
                            <input type="text" id="ropa-prenda" class="form-control rounded-0" placeholder="Ej. Vestido Seda Minimal" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold text-secondary small">Categoría</label>
                                <select id="ropa-categoria" class="form-select rounded-0">
                                    <option value="Camisetas">👕 Camisetas</option>
                                    <option value="Pantalones">👖 Pantalones</option>
                                    <option value="Sudaderas">🧥 Sudaderas</option>
                                    <option value="Chaquetas">🧥 Chaquetas</option>
                                    <option value="Accesorios">🕶️ Accesorios</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold text-secondary small">Talla</label>
                                <select id="ropa-talla" class="form-select rounded-0">
                                    <option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="Única">Única</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary small">Unidades Vendidas</label>
                            <input type="number" id="ropa-cantidad" class="form-control rounded-0" min="1" value="1" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-4">
                                <label class="form-label fw-semibold text-secondary small">Coste Unidad (€)</label>
                                <input type="number" id="ropa-compra" class="form-control rounded-0" step="0.01" required>
                            </div>
                            <div class="col-6 mb-4">
                                <label class="form-label fw-semibold text-secondary small">Precio Venta (€)</label>
                                <input type="number" id="ropa-venta" class="form-control rounded-0" step="0.01" required>
                            </div>
                        </div>
                        <button type="submit" id="btn-submit-form" class="btn btn-dark w-100 fw-bold rounded-0 text-uppercase py-2">
                            Guardar en Atlas Cloud
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-12 col-xl-8">
                <div class="card p-4 shadow-sm border-0 table-card">
                    <div class="mb-3">
                        <input type="text" id="tabla-buscador" class="form-control rounded-0" placeholder="Buscar prenda o categoría..." oninput="filtrarTabla()">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle m-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Fecha</th><th>Detalle Artículo</th><th>Talla</th><th>Cant.</th><th>Precios (C/V)</th><th>Margen</th><th class="text-end">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-ropa-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let VENTAS_CACHE = [];
    // LISTA BLANCA CLIENT-SIDE: Control de acceso estricto de seguridad
    const ALLOWED_USERS = ['dannymedinacoronel@gmail.com', 'juliamugo2001@gmail.com'];
    // URL DEFINITIVA DE TU BACKEND EN PRODUCCIÓN (Apunta a tu dominio con la ruta de la API)
    const BACKEND_URL = 'https://seychellesshop.com'; 

    async function handleCredentialResponse(response) {
        try {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(window.atob(base64));
            const userEmail = payload.email.toLowerCase().trim();

            if (ALLOWED_USERS.includes(userEmail)) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('user-email').innerText = `🔐 Administrador: ${userEmail}`;
                
                localStorage.setItem('admin_session', userEmail);
                recargarTodoElSistema();
            } else {
                alert("Acceso denegado: Tu cuenta de Google no está autorizada.");
            }
        } catch (error) {
            console.error("Error validando accesos:", error);
        }
    }

    async function recargarTodoElSistema() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/ventas`);
            if (!res.ok) return;
            const data = await res.json();
            
            document.getElementById('kpi-ingresos').innerText = `${Number(data.resumen.ingresos || 0).toFixed(2)} €`;
            document.getElementById('kpi-beneficio').innerText = `${Number(data.resumen.beneficio || 0).toFixed(2)} €`;
            document.getElementById('kpi-prendas').innerText = data.resumen.prendasVendidas || 0;
            
            VENTAS_CACHE = data.ventas || [];
            renderizarTabla(VENTAS_CACHE);
        } catch (err) {
            console.error("Error en sincronización con MongoDB:", err);
            renderizarTabla([]);
        }
    }

    function renderizarTabla(listaVentas) {
        const tbody = document.getElementById('tabla-ropa-body');
        tbody.innerHTML = '';
        
        if (!listaVentas || listaVentas.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted small">No hay transacciones guardadas en Atlas Cloud.</td></tr>`;
            return;
        }

        listaVentas.forEach(v => {
            const margenTotal = (Number(v.precioVenta) - Number(v.precioCompra)) * Number(v.cantidad);
            const porcentaje = v.precioVenta > 0 ? (((Number(v.precioVenta) - Number(v.precioCompra)) / Number(v.precioVenta)) * 100).toFixed(0) : 0;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="text-secondary small font-monospace-custom">${v.fecha || ''}</td>
                <td>
                    <div class="fw-bold">${v.prenda || ''}</div>
                    <span class="badge bg-light text-dark border">${v.categoria || ''}</span>
                </td>
                <td><span class="badge bg-light text-dark border">${v.talla || ''}</span></td>
                <td class="fw-bold">${v.cantidad || 0}</td>
                <td class="small text-secondary font-monospace-custom">C: ${Number(v.precioCompra || 0).toFixed(2)}€<br><b>V: ${Number(v.precioVenta || 0).toFixed(2)}€</b></td>
                <td><span class="text-success fw-bold font-monospace-custom">+${margenTotal.toFixed(2)} €</span><br><small class="text-muted">${porcentaje}% rent.</small></td>
                <td class="text-end">
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-white btn-sm text-primary border" onclick="activarModoEdicion('${v._id}', '${v.prenda}', '${v.categoria}', '${v.talla}', ${v.cantidad}, ${v.precioCompra}, ${v.precioVenta})"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-white btn-sm text-danger border" onclick="eliminarRegistro('${v._id}')"><i class="bi bi-trash3-fill"></i></button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('form-ropa').addEventListener('submit', async (e) => {
        e.preventDefault();
        const idParaEditar = document.getElementById('edit-id').value;
        const datos = {
            prenda: document.getElementById('ropa-prenda').value,
            categoria: document.getElementById('ropa-categoria').value,
            talla: document.getElementById('ropa-talla').value,
            cantidad: document.getElementById('ropa-cantidad').value,
            precioCompra: document.getElementById('ropa-compra').value,
            precioVenta: document.getElementById('ropa-venta').value
        };

        if (idParaEditar) {
            const res = await fetch(`${BACKEND_URL}/api/ventas/${idParaEditar}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            if (res.ok) {
                cancelarEdicion();
                recargarTodoElSistema();
            }
        } else {
            await fetch(`${BACKEND_URL}/api/ventas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            document.getElementById('form-ropa').reset();
            document.getElementById('ropa-cantidad').value = "1";
            recargarTodoElSistema();
        }
    });

    function activarModoEdicion(id, prenda, category, talla, cantidad, compra, venta) {
        document.getElementById('edit-id').value = id;
        document.getElementById('ropa-prenda').value = prenda;
        document.getElementById('ropa-categoria').value = category;
        document.getElementById('ropa-talla').value = talla;
        document.getElementById('ropa-cantidad').value = cantidad;
        document.getElementById('ropa-compra').value = compra;
        document.getElementById('ropa-venta').value = venta;

        document.getElementById('form-title').innerText = "📝 Editando Artículo";
        document.getElementById('btn-submit-form').innerText = "Actualizar Cambios Remotos";
        document.getElementById('btn-submit-form').className = "btn btn-warning w-100 fw-bold rounded-0 text-dark";
    }

    function cancelarEdicion() {
        document.getElementById('edit-id').value = "";
        document.getElementById('form-ropa').reset();
        document.getElementById('ropa-cantidad').value = "1";
        document.getElementById('form-title').innerText = "Registrar Nueva Operación";
        document.getElementById('btn-submit-form').innerText = "Guardar en Base de Datos";
        document.getElementById('btn-submit-form').className = "btn btn-dark w-100 fw-bold rounded-0";
    }

    async function eliminarRegistro(id) {
        if (confirm("⚠️ ¿Deseas eliminar este registro de MongoDB Atlas permanentemente?")) {
            const res = await fetch(`${BACKEND_URL}/api/ventas/${id}`, { method: 'DELETE' });
            if (res.ok) recargarTodoElSistema();
        }
    }

    function filtrarTabla() {
        const texto = document.getElementById('tabla-buscador').value.toLowerCase().trim();
        const filtrados = VENTAS_CACHE.filter(v => {
            return (v.prenda || '').toLowerCase().includes(texto) || (v.categoria || '').toLowerCase().includes(texto);
        });
        renderizarTabla(filtrados);
    }

    function cerrarSesionLocal() {
        localStorage.removeItem('admin_session');
        window.location.reload();
    }

    window.addEventListener('DOMContentLoaded', () => {
        const sesionGuardada = localStorage.getItem('admin_session');
        if (sesionGuardada && ALLOWED_USERS.includes(sesionGuardada)) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('user-email').innerText = `🔐 Administrador: ${sesionGuardada}`;
            recargarTodoElSistema();
        }
    });
</script>
</body>
</html>
